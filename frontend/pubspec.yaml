name: wardsync
description: Real-time Field Hospital Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0
  firebase_messaging: ^15.1.0
  firebase_storage: ^12.1.0

  # HTTP Client
  dio: ^5.6.0

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.0

  # Camera / Image
  camera: ^0.11.0
  image_picker: ^1.1.2

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
